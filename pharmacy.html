<!DOCTYPE html>
<html>
<head>
  <title>Pharmacy Dashboard - PharmaConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0f7fa 0%, #f0f9ff 100%); min-height: 100vh; color: #0f172a; }
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); padding: 1rem 0; box-shadow: 0 1px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
    .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #00b4d8, #0077b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-link { color: #334155; text-decoration: none; font-weight: 500; padding: 0.5rem 1rem; border-radius: 8px; transition: all 0.2s; }
    .nav-link:hover { background: #e0f7fa; color: #0077b6; }
    .signout-btn { background: linear-gradient(135deg, #00b4d8, #0077b6); color: white; padding: 0.6rem 1.25rem; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; font-family: 'Inter', sans-serif; }
    .page-header { background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); padding: 2rem; border-radius: 24px; margin: 2rem 2rem 1rem; box-shadow: 0 10px 40px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .pharmacy-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #00b4d8, #0077b6); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: white; }
    .header-title { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #0f172a, #1e293b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .back-btn { background: linear-gradient(135deg, #00b4d8, #0077b6); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 12px; font-weight: 600; cursor: pointer; text-decoration: none; font-family: 'Inter', sans-serif; }
    .stats-section { padding: 0 2rem 2rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card { background: white; padding: 2rem; border-radius: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,180,216,0.1); border: 1px solid rgba(0,180,216,0.2); }
    .stat-number { font-size: 3rem; font-weight: 800; color: #00b4d8; }
    .stat-label { font-size: 1rem; color: #64748b; margin-top: 0.5rem; }
    .orders-section { padding: 0 2rem 2rem; }
    .table-container { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
    .table-header { padding: 1.5rem 2rem; background: linear-gradient(135deg, #f8fafc, #e2e8f0); font-size: 1.2rem; font-weight: 600; border-bottom: 1px solid #e2e8f0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 1.25rem 2rem; text-align: left; }
    th { background: #f8fafc; font-weight: 600; color: #374151; }
    td { border-bottom: 1px solid #f1f5f9; }
    .status-badge { padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
    .status-pending   { background: #fef3c7; color: #d97706; }
    .status-confirmed { background: #dbeafe; color: #2563eb; }
    .status-ready     { background: #d1fae5; color: #059669; }
    .status-select { padding: 0.5rem 1rem; border: 1px solid #d1d5db; border-radius: 8px; background: white; font-size: 0.85rem; min-width: 100px; }
    .customer-info { font-weight: 500; }
    .customer-phone { color: #64748b; font-size: 0.9rem; }
    @media (max-width: 768px) { .page-header { flex-direction: column; gap: 1rem; text-align: center; } .stats-grid { grid-template-columns: 1fr; } table { font-size: 0.9rem; } th, td { padding: 1rem; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">🧬 PharmaConnect</div>
      <div class="nav-right">
        <a href="stock.html" class="nav-link">📦 Stock Management</a>
        <button class="signout-btn" onclick="signOut()">Sign Out</button>
      </div>
    </div>
  </nav>
  <div class="page-header">
    <div class="header-left">
      <div class="pharmacy-icon">🏪</div>
      <div>
        <div class="header-title">Orders Dashboard</div>
        <div style="color:#64748b;font-size:1.1rem;">City Med Store - Model Town</div>
      </div>
    </div>
    <a href="stock.html" class="back-btn">← Back to Stock Portal</a>
  </div>
  <div class="stats-section">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number" data-stat="pending">3</div><div class="stat-label">Pending Orders</div></div>
      <div class="stat-card"><div class="stat-number" data-stat="total">12</div><div class="stat-label">Total Today</div></div>
      <div class="stat-card"><div class="stat-number" data-stat="completed">8</div><div class="stat-label">Completed</div></div>
    </div>
  </div>
  <div class="orders-section">
    <div class="table-container">
      <div class="table-header">Recent Orders</div>
      <table>
        <thead><tr><th>ID</th><th>Customer</th><th>Medicine</th><th>Qty</th><th>Time</th><th>Status</th></tr></thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>
  </div>
  <script>
    const _user = sessionStorage.getItem('pharmaUser');
    const _SPECIAL = ['DOC001','DOC002','PHR001','PHR002'];
    if (!_user || !_SPECIAL.includes(_user.toUpperCase())) window.location.href = 'index.html';
    function signOut() { sessionStorage.removeItem('pharmaUser'); window.location.href = 'login.html'; }

    const sampleOrders = [
      {id:1, name:"Saksham Singh", phone:"9876543210", medicine:"Paracetamol 500mg", qty:2, time:"14:32", status:"pending"},
      {id:2, name:"Priya Sharma",  phone:"9876543211", medicine:"Dolo 650mg",        qty:1, time:"14:15", status:"confirmed"},
      {id:3, name:"Rohit Kumar",   phone:"9876543212", medicine:"Crocin 500mg",      qty:3, time:"13:45", status:"ready"},
      {id:4, name:"Anjali Devi",   phone:"9876543213", medicine:"Amoxicillin 250mg", qty:1, time:"13:20", status:"pending"}
    ];
    function renderOrders() {
      document.getElementById('ordersTable').innerHTML = sampleOrders.map(o => `
        <tr>
          <td>#${o.id}</td>
          <td><div class="customer-info">${o.name}</div><div class="customer-phone">${o.phone}</div></td>
          <td>${o.medicine}</td><td>${o.qty}</td><td>${o.time}</td>
          <td>
            <span class="status-badge status-${o.status}">${o.status}</span>
            <select class="status-select" onchange="updateStatus(${o.id}, this.value)">
              <option value="pending"   ${o.status==='pending'   ?'selected':''}>Pending</option>
              <option value="confirmed" ${o.status==='confirmed' ?'selected':''}>Confirmed</option>
              <option value="ready"     ${o.status==='ready'     ?'selected':''}>Ready</option>
              <option value="completed">Completed</option>
            </select>
          </td>
        </tr>`).join('');
    }
    function updateStatus(id, status) {
      const o = sampleOrders.find(o => o.id === id); if (!o) return;
      o.status = status; renderOrders(); updateStats();
      setTimeout(() => alert(`✅ Order #${id} updated to ${status.toUpperCase()}`), 300);
    }
    function updateStats() {
      document.querySelector('[data-stat="pending"]').textContent   = sampleOrders.filter(o=>o.status==='pending').length;
      document.querySelector('[data-stat="total"]').textContent     = sampleOrders.length;
      document.querySelector('[data-stat="completed"]').textContent = sampleOrders.filter(o=>o.status==='completed'||o.status==='ready').length;
    }
    renderOrders(); updateStats();
    setInterval(renderOrders, 10000);
  </script>
</body>
</html>
