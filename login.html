<!DOCTYPE html>
<html>
<head>
  <title>PharmaConnect - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0f7fa 0%, #f0f9ff 100%); min-height: 100vh; color: #0f172a; display: flex; flex-direction: column; }
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); padding: 1rem 0; box-shadow: 0 1px 10px rgba(0,0,0,0.05); }
    .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #00b4d8, #0077b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 2rem; }
    .login-card { background: white; border-radius: 28px; padding: 3rem; box-shadow: 0 20px 60px rgba(0,180,216,0.15); border: 1px solid rgba(0,180,216,0.2); width: 100%; max-width: 460px; }
    .login-header { text-align: center; margin-bottom: 2.5rem; }
    .login-icon { width: 72px; height: 72px; background: linear-gradient(135deg, #00b4d8, #0077b6); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.25rem; }
    .login-title { font-size: 1.8rem; font-weight: 700; color: #0f172a; margin-bottom: 0.4rem; }
    .login-subtitle { color: #64748b; font-size: 1rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-label { display: block; font-weight: 600; color: #374151; margin-bottom: 0.5rem; font-size: 0.95rem; }
    .form-input { width: 100%; padding: 0.9rem 1.2rem; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; font-family: 'Inter', sans-serif; transition: border-color 0.2s; outline: none; color: #0f172a; }
    .form-input:focus { border-color: #00b4d8; }
    .form-input::placeholder { color: #94a3b8; }
    .login-btn { width: 100%; background: linear-gradient(135deg, #00b4d8, #0077b6); color: white; border: none; padding: 1rem 2rem; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 0.5rem; font-family: 'Inter', sans-serif; }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,180,216,0.4); }
    .error-msg { background: #fee2e2; color: #dc2626; padding: 0.75rem 1rem; border-radius: 10px; font-size: 0.9rem; margin-bottom: 1.5rem; display: none; text-align: center; }
    .divider { text-align: center; color: #94a3b8; margin: 1.5rem 0; font-size: 0.9rem; }
    .special-id-note { background: linear-gradient(135deg, #eff6ff, #dbeafe); border: 1px solid #bfdbfe; border-radius: 12px; padding: 1rem 1.25rem; font-size: 0.88rem; color: #1e40af; line-height: 1.6; }
    .special-id-note strong { display: block; margin-bottom: 0.25rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">🧬 PharmaConnect</div>
    </div>
  </nav>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">🔐</div>
        <div class="login-title">Welcome Back</div>
        <div class="login-subtitle">Sign in to continue to PharmaConnect</div>
      </div>
      <div class="error-msg" id="errorMsg">⚠️ Please enter both ID and password.</div>
      <div class="form-group">
        <label class="form-label">User ID / Email</label>
        <input type="text" class="form-input" id="userId" placeholder="Enter your ID or email" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="Enter your password" />
      </div>
      <button class="login-btn" onclick="handleLogin()">Sign In →</button>
      <div class="divider">— Demo Credentials —</div>
      <div class="special-id-note">
        <strong>🏥 Doctor / Pharmacy Owner Portal</strong>
        Use ID: <b>DOC001</b>, <b>DOC002</b>, <b>PHR001</b>, or <b>PHR002</b> with any password<br><br>
        <strong>👤 Regular User</strong>
        Use any other ID (e.g. <b>user@email.com</b>) with any password
      </div>
    </div>
  </div>
  <script>
    const SPECIAL_IDS = ['DOC001','DOC002','PHR001','PHR002'];
    function handleLogin() {
      const userId = document.getElementById('userId').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      if (!userId || !password) { errorMsg.style.display = 'block'; return; }
      errorMsg.style.display = 'none';
      sessionStorage.setItem('pharmaUser', userId);
      window.location.href = SPECIAL_IDS.includes(userId.toUpperCase()) ? 'stock.html' : 'index.html';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    const existing = sessionStorage.getItem('pharmaUser');
    if (existing) window.location.href = SPECIAL_IDS.includes(existing.toUpperCase()) ? 'stock.html' : 'index.html';
  </script>
</body>
</html>
